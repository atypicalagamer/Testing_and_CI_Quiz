name: Engagement Engine CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    # This tells the 'test' job to run INSIDE your custom image
    container:
      image: mtomlinsiue/testing_and_ci:v1.2
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # NOTE: Since your Dockerfile already installs requirements,
      # you technically don't need 'Set up Python' or 'Install dependencies' here.
      # Running them again won't hurt, but it's redundant.

      - name: Run tests with coverage
        run: |
          pytest --cov=engagement --cov-report=html test_engagement.py

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/